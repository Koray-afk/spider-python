    <meta charset="UTF-8">

    <title>Careers - HubSpot</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            color: #33475b;
        }
        .hubspot-orange { background-color: #ff7a59; }
        .hubspot-text-orange { color: #ff7a59; }
        .hubspot-dark-text { color: #33475b; }
        .hubspot-light-gray-bg { background-color: #f5f8fa; }
        .hubspot-dark-green-bg { background-color: #132c31; }
        .hubspot-blue-link { color: #00a3db; }
        .hubspot-border-gray { border-color: #cbd2d9; }

        /* Custom HubSpot logo (simplified) */
        .hubspot-logo {
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #ff7a59;
        }
        .hubspot-logo-icon {
            width: 28px;
            height: 28px;
            background-color: #ff7a59;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
        }
        .hubspot-logo-icon::before {
            content: '';
            position: absolute;
            width: 60%;
            height: 60%;
            background-color: white;
            border-radius: 4px; /* Slight roundness for the inner square */
            transform: rotate(45deg);
        }

        /* Hero section background to simulate the image */
        .hero-bg {
            background-image: linear-gradient(rgba(19, 44, 49, 0.4), rgba(19, 44, 49, 0.4)), url('https://cdn.jsdelivr.net/gh/tailwindlabs/tailwindcss/stubs/full.html'); /* Placeholder - a real blurred image would be better */
            background-size: cover;
            background-position: center;
            background-blend-mode: multiply; /* Helps achieve the dark overlay look */
            background-color: #132c31; /* Base color if image fails to load */
        }
        .hero-card {
            background-color: rgba(19, 44, 49, 0.85); /* Dark green, semi-transparent */
        }

        /* Culture Code Card - recreating the visual with text and SVG heart */
        .culture-code-card {
            background-color: #ff7a59;
            position: relative;
            overflow: hidden;
        }
        .culture-code-heart {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 0;
        }
        .culture-code-heart svg {
            width: 100%;
            height: 100%;
            color: rgba(255, 255, 255, 0.2); /* Semi-transparent white for binary */
        }
        .culture-code-text-overlay {
            position: relative;
            z-index: 10;
        }

        /* Floating orange blob for "Waiting for the perfect fit?" section */
        .floating-blob {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%) translateX(25%); /* Adjust to move it partially off-screen */
            width: 500px; /* Large enough */
            height: 500px;
            background-color: #ff7a59;
            border-radius: 50%;
            z-index: 0;
        }
        /* Make content relative to be above blob */
        .z-content > * { position: relative; z-index: 10; }
    </style>
</head>
